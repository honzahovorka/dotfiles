# https://wiki.hypr.land/Configuring/Dwindle-Layout/
layout {
    # Avoid overly wide single-window layouts on wide screens
    single_window_aspect_ratio = 1 1
}

# Start with idle lock off (wait for default autostart's hypridle, then toggle)
exec-once = bash -c 'while ! pgrep -x hypridle >/dev/null; do sleep 0.2; done; omarchy toggle idle'
